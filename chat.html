<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <title>CS Digital Setup — Configuration de votre Claude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>

  <!-- Ecran de chargement -->
  <div id="loading-screen" class="chat-loading">
    <div class="spinner"></div>
    <p>Chargement de votre session...</p>
  </div>

  <!-- Ecran d'erreur -->
  <div id="error-screen" class="chat-error" style="display:none;">
    <h2>Session introuvable</h2>
    <p>Ce lien n'est pas valide ou a expir&eacute;. V&eacute;rifiez le lien re&ccedil;u par email.</p>
  </div>

  <!-- Interface chat -->
  <div id="chat-screen" class="chat-container" style="display:none;">
    <header class="chat-header">
      <div class="chat-header-logo">CS</div>
      <div>
        <div class="chat-header-title">CS Digital Setup</div>
        <div class="chat-header-subtitle">Configuration personnalis&eacute;e de votre Claude</div>
      </div>
    </header>

    <main class="chat-messages" id="messages-container">
      <!-- Les messages sont injectes par JS -->
      <div class="typing-indicator" id="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </main>

    <footer class="chat-input-area">
      <div class="chat-input-wrapper">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Tapez ou dictez votre r&eacute;ponse..."
          rows="1"
        ></textarea>
        <button id="mic-btn" class="chat-mic-btn" aria-label="Dicter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
        <button id="send-btn" class="chat-send-btn" aria-label="Envoyer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="js/config-display.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
